<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Classroom Allocator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4080FF',
                        primaryHover: '#3568D4',
                        background: '#0B0F19',
                        panel: 'rgba(30, 41, 59, 0.4)',
                        panelBorder: 'rgba(255, 255, 255, 0.08)'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at 15% 50%, #1e1b4b, #0B0F19 40%),
                radial-gradient(circle at 85% 30%, #0c4a6e, #0B0F19 50%);
            background-color: #0B0F19;
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--tw-colors-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--tw-colors-panelBorder);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Input Styling */
        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus,
        .input-glass:hover {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(64, 128, 255, 0.5);
            box-shadow: 0 0 0 4px rgba(64, 128, 255, 0.1);
            outline: none;
        }

        .input-glass::placeholder {
            color: #64748b;
        }

        /* Custom Select Arrow */
        select.input-glass {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.25rem center;
            background-size: 1.25em;
            cursor: pointer;
        }

        /* Primary Button Enhancements */
        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(64, 128, 255, 0.39);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(64, 128, 255, 0.6);
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(30deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(30deg);
            }

            20%,
            100% {
                transform: translateX(100%) rotate(30deg);
            }
        }

        /* Number Input Spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            background: #1e293b;
            height: 2rem;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Result Entry Animations */
        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(5px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .animate-reveal {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Ambient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(56, 189, 248, 0.15);
            top: -10%;
            left: 0%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.15);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Shake Animation for Validation */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(4px);
            }
        }

        .error-shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2) !important;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center relative p-4 sm:p-8">

    <!-- Ambient Background Lighting -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="w-full max-w-[440px] z-10">

        <!-- Header -->
        <div class="text-center mb-10 animate-reveal">
            <div
                class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary/20 to-indigo-500/10 border border-primary/20 mb-6 shadow-lg shadow-primary/10">
                <i class="fa-solid fa-map-location-dot text-2xl text-primary"></i>
            </div>
            <h1
                class="text-3xl sm:text-4xl font-bold tracking-tight mb-3 text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">
                Exam Class Allocator
            </h1>
            <p class="text-slate-400 font-light tracking-wide text-[15px]">Find your designated exam classroom</p>
        </div>

        <!-- Main Card -->
        <div class="glass-panel rounded-3xl p-6 sm:p-8 animate-reveal" style="animation-delay: 0.1s">
            <form id="seatForm" class="space-y-5">

                <!-- Roll Number Field -->
                <div>
                    <label for="rollNo" class="block text-sm font-medium text-slate-300 mb-2 ml-1">
                        <i class="fa-solid fa-id-badge text-primary/70 mr-2 text-xs"></i>Roll Number
                    </label>
                    <div class="relative">
                        <input type="number" id="rollNo" value="168" placeholder="e.g. 168" min="1" required
                            class="w-full input-glass text-white rounded-xl px-4 py-3.5 font-medium text-[15px]">
                    </div>
                </div>

                <!-- Department Field -->
                <div>
                    <label for="department" class="block text-sm font-medium text-slate-300 mb-2 ml-1">
                        <i class="fa-solid fa-building text-primary/70 mr-2 text-xs"></i>Department
                    </label>
                    <select id="department" required
                        class="w-full input-glass text-white rounded-xl px-4 py-3.5 font-medium text-[15px]">
                        <option value="" disabled class="bg-slate-900">Select Department</option>
                        <option value="AIDS" selected class="bg-slate-800">AIDS</option>
                        <option value="CS" class="bg-slate-800">Computer Science (CS)</option>
                        <option value="IT" class="bg-slate-800">Information Technology (IT)</option>
                        <option value="MECH" class="bg-slate-800">Mechanical Engineering (MECH)</option>
                    </select>
                </div>

                <!-- Semester Field -->
                <div>
                    <label for="semester" class="block text-sm font-medium text-slate-300 mb-2 ml-1">
                        <i class="fa-solid fa-calendar-days text-primary/70 mr-2 text-xs"></i>Semester
                    </label>
                    <select id="semester" required
                        class="w-full input-glass text-white rounded-xl px-4 py-3.5 font-medium text-[15px]">
                        <option value="" disabled class="bg-slate-900">Select Semester</option>
                        <option value="1" class="bg-slate-800">Semester 1</option>
                        <option value="2" class="bg-slate-800">Semester 2</option>
                        <option value="3" class="bg-slate-800">Semester 3</option>
                        <option value="4" class="bg-slate-800">Semester 4</option>
                        <option value="5" class="bg-slate-800">Semester 5</option>
                        <option value="6" class="bg-slate-800">Semester 6</option>
                        <option value="7" class="bg-slate-800">Semester 7</option>
                        <option value="8" class="bg-slate-800">Semester 8</option>
                    </select>
                </div>

                <!-- Error Message Container (Hidden by Default) -->
                <div id="errorMsg" class="hidden flex items-center gap-2 text-red-400 text-sm mt-2 ml-1">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Please enter a valid roll number.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full mt-8 bg-gradient-to-r from-primary to-indigo-600 text-white font-semibold rounded-xl py-4 btn-glow flex justify-center items-center gap-2 text-[15px] tracking-wide relative">
                    <span id="btnText" class="flex items-center gap-2">
                        Find My Seat <i class="fa-solid fa-arrow-right text-sm"></i>
                    </span>
                    <div id="btnLoader" class="loader hidden absolute"></div>
                </button>
            </form>
        </div>

        <!-- Result Modal (Hidden by default) -->
        <div id="resultOverlay"
            class="fixed inset-0 bg-[#0B0F19]/80 backdrop-blur-md z-50 hidden flex-col items-center justify-center p-4">

            <div id="resultCard"
                class="glass-panel p-8 sm:p-10 rounded-[2rem] w-full max-w-md text-center transform scale-95 opacity-0 transition-all duration-500 border-t border-t-white/10 relative overflow-hidden">

                <!-- Decorative background flair in result card -->
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl"></div>

                <!-- Success Icon -->
                <div
                    class="w-20 h-20 mx-auto bg-gradient-to-br from-emerald-400 to-green-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-emerald-500/20 transform rotate-3">
                    <i class="fa-solid fa-check text-3xl text-white transform -rotate-3"></i>
                </div>

                <h3 class="text-lg font-medium text-slate-300 mb-2 uppercase tracking-widest text-sm">Seat Allocated
                </h3>

                <!-- Big Room Display -->
                <div class="my-6">
                    <p id="roomDisplay"
                        class="text-6xl sm:text-7xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-slate-200 to-slate-400">
                        <!-- EL-211 -->
                    </p>
                </div>

                <!-- Subject Info -->
                <div class="bg-black/20 rounded-2xl p-4 mb-8 border border-white/5 backdrop-blur-sm">
                    <p class="text-xs text-slate-500 uppercase tracking-wider mb-1 font-semibold">Exam Subject</p>
                    <p id="subjectDisplay" class="text-[15px] text-slate-200 font-medium">
                        <!-- Database Management Systems -->
                    </p>
                </div>

                <!-- Meta Info -->
                <div
                    class="flex justify-between items-center text-sm text-slate-400 px-4 mb-8 border-t border-white/5 pt-6">
                    <div class="flex flex-col text-left gap-1">
                        <span class="text-xs uppercase tracking-wider text-slate-500">Dept</span>
                        <span id="deptDisplay" class="font-medium text-slate-300">AIDS (IV)</span>
                    </div>
                    <div class="h-8 w-px bg-white/10"></div>
                    <div class="flex flex-col text-right gap-1">
                        <span class="text-xs uppercase tracking-wider text-slate-500">Roll No</span>
                        <span id="rollDisplay" class="font-medium text-slate-300">168</span>
                    </div>
                </div>

                <!-- Close Button -->
                <button id="closeBtn"
                    class="w-full bg-white/5 hover:bg-white/10 text-white font-medium rounded-xl py-3.5 transition-colors border border-white/10 text-[15px]">
                    Done
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-[13px] text-slate-500/80 text-center font-medium animate-reveal"
            style="animation-delay: 0.2s">
            Seat Finder &bull; Built with <span class="text-red-500">❤️</span> by Atharv
        </div>

    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>

</html>
